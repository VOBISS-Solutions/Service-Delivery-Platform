services:
  - type: web
    name: service-delivery-platform
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: HOST=0.0.0.0 python app.py
    healthCheckPath: /api/health
    envVars:
      - key: TRACKER_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
