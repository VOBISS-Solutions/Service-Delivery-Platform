services:
  - type: web
    name: service-delivery-platform
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: HOST=0.0.0.0 REQUIRE_DATABASE_URL=true python app.py
    healthCheckPath: /api/health
    envVars:
      - key: TRACKER_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
