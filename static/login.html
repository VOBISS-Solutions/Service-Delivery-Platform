<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Service Delivery Tracker</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-panel">
      <div class="brand login-brand">
        <span class="brand-mark">SD</span>
        <div>
          <strong>Delivery Tracker</strong>
          <span>Manager test access</span>
        </div>
      </div>
      <form id="loginForm">
        <label>Password
          <input id="password" type="password" autocomplete="current-password" autofocus required>
        </label>
        <button class="primary" type="submit">Login</button>
        <p id="loginError" class="login-error"></p>
      </form>
    </section>
  </main>
  <script>
    document.querySelector('#loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const error = document.querySelector('#loginError');
      error.textContent = '';
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: document.querySelector('#password').value })
      });
      if (response.ok) {
        window.location = '/';
      } else {
        error.textContent = 'Invalid password';
      }
    });
  </script>
</body>
</html>
